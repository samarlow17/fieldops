<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FieldOps</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --line:#e6e9ef; --line2:#d0d4dd;
    --text:#323338; --muted:#676879; --accent:#0073ea; --accent2:#0060b9;
    --rowhover:#f5f6f8; --head:#f9fafc;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);
    padding:11px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{font-weight:800;font-size:18px}.logo span{color:var(--accent)}
  .role{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:6px;background:#eef1f7;color:var(--muted)}
  .role.admin{background:#e5f0ff;color:var(--accent)}
  .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .who{font-size:13px;color:var(--muted)}
  .link{color:var(--accent);cursor:pointer;font-size:13px;background:none;border:none;padding:0}
  .bar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:#fff;position:relative;z-index:20}
  .seg{display:flex;gap:6px}
  .seg button{font-size:13px;padding:6px 14px;border-radius:8px;border:1px solid var(--line2);background:#fff;color:var(--muted);cursor:pointer;font-weight:600}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .search{flex:1;min-width:150px;background:#fff;border:1px solid var(--line2);border-radius:8px;padding:8px 12px;font-size:14px}
  .search:focus{outline:none;border-color:var(--accent)}
  .wrap{padding:14px 16px 60px;max-width:1100px;margin:0 auto}
  .loading,.empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .big{font-size:42px;margin-bottom:8px}

  /* board view */
  .group{margin-bottom:22px}
  .ghead{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;user-select:none}
  .caret{width:0;height:0;border-left:6px solid currentColor;border-top:5px solid transparent;border-bottom:5px solid transparent;transition:transform .15s}
  .group.collapsed .caret{transform:rotate(0)}
  .group:not(.collapsed) .caret{transform:rotate(90deg)}
  .gtitle{font-weight:700;font-size:15px}
  .gcount{font-size:12px;color:var(--muted);background:#eef1f7;border-radius:10px;padding:1px 8px}
  .gboard{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border:1px solid var(--line2);border-radius:5px;padding:1px 6px}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:#fff}
  table{border-collapse:collapse;width:100%;min-width:720px;font-size:13px}
  thead th{background:var(--head);color:var(--muted);font-weight:600;text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:0;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr{cursor:pointer}tbody tr:hover{background:var(--rowhover)}
  td .cell{padding:10px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
  td.name .cell{font-weight:600;border-left:4px solid var(--gc,#c4c4c4);max-width:320px;white-space:normal}
  .pill{display:inline-block;color:#fff;font-weight:600;font-size:12px;padding:5px 10px;border-radius:5px;text-align:center;min-width:90px}
  .muted{color:var(--muted)}.cam{color:var(--muted);font-weight:600}

  /* calendar */
  .calbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .navbtn{border:1px solid var(--line2);background:#fff;border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;color:var(--text)}
  .navbtn:hover{background:var(--rowhover)}
  .calmonth{font-weight:700;font-size:17px;min-width:170px;text-align:center}
  .todaybtn{border:1px solid var(--line2);background:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .filterwrap{position:relative;margin-left:auto}
  .filterbtn{border:1px solid var(--line2);background:#fff;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
  .filterpanel{position:absolute;right:0;top:42px;z-index:40;background:#fff;border:1px solid var(--line2);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.12);padding:8px;width:240px;max-height:320px;overflow-y:auto;display:none}
  .filterpanel.open{display:block}
  .filterpanel .fitem{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:14px;cursor:pointer}
  .filterpanel .fitem:hover{background:var(--rowhover)}
  .filterpanel .fitem input{width:auto}
  .filterpanel .fhead{display:flex;justify-content:space-between;padding:4px 8px 8px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .gridhead{background:var(--head);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;text-align:center;padding:7px 2px}
  .day{background:#fff;min-height:96px;padding:5px;cursor:pointer;display:flex;flex-direction:column;gap:3px}
  .day.out{background:#fafbfd}
  .day:hover{background:var(--rowhover)}
  .daynum{font-size:12px;color:var(--muted);font-weight:600;align-self:flex-start}
  .day.today .daynum{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .evt{font-size:11px;color:#fff;border-radius:4px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .evtmore{font-size:11px;color:var(--muted);font-weight:600;padding-left:3px}
  @media(max-width:620px){
    .day{min-height:60px;padding:3px}
    .evt{font-size:0;padding:0;height:6px;width:100%;border-radius:3px}
    .evtmore{font-size:10px}
    .calmonth{min-width:120px;font-size:15px}
  }
  /* day panel */
  .daypanel{margin-top:16px}
  .daypanel h3{font-size:15px;margin:0 0 8px}
  .dayjob{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--gc,#c4c4c4);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
  .dayjob:hover{background:var(--rowhover)}
  .dayjob .t{font-weight:700;font-size:13px;min-width:46px;color:var(--text)}
  .dayjob .nm{font-weight:600;font-size:14px}
  .dayjob .sub{font-size:12px;color:var(--muted)}

  /* detail sheet */
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center}
  .sheet.open{display:flex}
  .sheet-inner{background:#fff;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:14px 14px 0 0;padding:18px 18px 30px}
  @media(min-width:640px){.sheet{align-items:center}.sheet-inner{border-radius:14px}}
  .sheet h2{margin:2px 0 4px;font-size:19px}
  .detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
  .chip{background:#f1f3f8;border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:13px;color:var(--muted)}
  .chip b{color:var(--text);font-weight:600}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600}
  input,select{width:100%;background:#fff;border:1px solid var(--line2);color:var(--text);border-radius:8px;padding:11px;font-size:15px;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .note-box{background:#f9fafc;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:14px;white-space:pre-wrap;color:#3a3b44}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}
  .btn:active{background:var(--accent2)}.btn:disabled{opacity:.5}
  .btn.ghost{background:#fff;border:1px solid var(--line2);color:var(--text);margin-top:9px}
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
  .photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--line);background:#eef1f7}
  .photo-grid .file{aspect-ratio:1;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;color:var(--muted);padding:6px;background:#f9fafc;word-break:break-word}
  .photo-grid .add{aspect-ratio:1;border:2px dashed var(--line2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;color:var(--muted);font-size:13px;cursor:pointer;background:#fbfcfe}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
  .lightbox.open{display:flex}.lightbox img{max-width:100%;max-height:100%;border-radius:6px}
  .msg{font-size:13px;margin-top:12px;padding:10px;border-radius:8px;display:none}
  .msg.err{display:block;background:#fff0f0;color:#c0392b;border:1px solid #f3c2c2}
  .msg.ok{display:block;background:#eafaf0;color:#1f8b4c;border:1px solid #b6e6c8}
  .hide{display:none !important}
  .viewbtn{font-size:13px;padding:7px 14px;border-radius:8px;border:1px solid var(--line2);background:#fff;color:var(--accent);cursor:pointer;font-weight:700}
  .viewbtn:hover{background:var(--rowhover)}
  .urow{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;flex-wrap:wrap}
  .urow .uinfo{flex:1;min-width:130px}
  .urow .uname{font-weight:600;font-size:14px}
  .urow .uemail{font-size:12px;color:var(--muted)}
  .urow select,.urow .ucon{width:auto;padding:9px}
  .urow .ucon{flex:1;min-width:120px}
  .urow .usave{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-weight:600;cursor:pointer}
  .urow .usave:disabled{opacity:.5}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid #c9cfdb;border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;width:100%;max-width:360px;box-shadow:0 6px 30px rgba(0,0,0,.06)}
  .login h1{margin:0 0 4px;font-size:26px}.login h1 span{color:var(--accent)}
  .login .sub{color:var(--muted);font-size:14px;margin-bottom:4px}
  input[type=file]{display:none}
</style>
</head>
<body>

<div id="login" class="center">
  <div class="login">
    <h1>Field<span>Ops</span></h1>
    <div class="sub" id="authSub">Sign in to your account.</div>
    <div class="seg" id="authSeg" style="margin:14px 0 2px">
      <button id="segIn" class="on" type="button" onclick="authMode('in')">Sign in</button>
      <button id="segUp" type="button" onclick="authMode('up')">Create account</button>
    </div>
    <div id="nameWrap" class="hide"><label>Your name</label><input id="auName" type="text" autocomplete="name"></div>
    <label>Email</label>
    <input id="auEmail" type="email" autocomplete="email" placeholder="you@example.com">
    <label>Password</label>
    <input id="auPass" type="password" autocomplete="current-password" placeholder="••••••">
    <button class="btn" id="loginBtn">Sign in</button>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<div id="app" class="hide">
  <header>
    <div class="logo">Field<span>Ops</span></div>
    <span class="role" id="hRole">—</span>
    <div class="right"><span class="who" id="hWho"></span><button class="link" id="signOut">Sign out</button></div>
  </header>
  <div class="bar">
    <button class="viewbtn" id="viewToggle">📅 Calendar view</button>
    <button class="viewbtn hide" id="usersBtn" onclick="openUsers()">👤 Users</button>
    <input class="search" id="search" placeholder="Search jobs, address, contractor…">
    <button class="link" id="refresh">↻ Refresh</button>
  </div>
  <div class="wrap" id="board"><div class="loading"><span class="spin"></span> Loading…</div></div>
</div>

<div class="sheet" id="detailSheet"><div class="sheet-inner" id="detailInner"></div></div>
<div class="sheet" id="usersSheet"><div class="sheet-inner" id="usersInner"></div></div>
<div class="lightbox" id="lightbox"><img id="lightImg" src="" alt=""></div>
<datalist id="contractorList"></datalist>
<input type="file" id="fileInput" accept="image/*" multiple capture="environment">

<script>
const $=id=>document.getElementById(id);
// storage-safe wrappers (some browsers block sessionStorage; never let that break the page)
const store={get:k=>{try{return sessionStorage.getItem(k)}catch(e){return null}},
  set:(k,v)=>{try{sessionStorage.setItem(k,v)}catch(e){}},
  del:k=>{try{sessionStorage.removeItem(k)}catch(e){}}};
let me=null, token=store.get('fo_token')||'', sections=[], contractors={}, boardFilter='all';
let view='board', photoTarget=null, collapsed={}, authM='in';
let calRef=new Date(), calSelDay=null, contractorSel=null; // null = all
const HEAD=()=>({'Authorization':'Bearer '+token});
const JHEAD=()=>({'Authorization':'Bearer '+token,'Content-Type':'application/json'});
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function msg(id,t,k){const e=$(id);if(!e)return;e.textContent=t;e.className='msg '+(k||'');}
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

/* ---- auth: sign in / create account ---- */
function authMode(m){ authM=m;
  $('segIn').classList.toggle('on',m==='in'); $('segUp').classList.toggle('on',m==='up');
  $('nameWrap').classList.toggle('hide',m!=='up');
  $('loginBtn').textContent = m==='up'?'Create account':'Sign in';
  $('authSub').textContent = m==='up'?'Create an account — an admin will approve you.':'Sign in to your account.';
  msg('loginMsg','','');
}
$('loginBtn').onclick=login;
$('auPass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
async function login(){
  const email=$('auEmail').value.trim(), password=$('auPass').value, name=$('auName').value.trim();
  if(!email||!password){msg('loginMsg','Enter your email and password.','err');return;}
  $('loginBtn').disabled=true;
  try{
    if(authM==='up'){
      if(!name){msg('loginMsg','Enter your name.','err');$('loginBtn').disabled=false;return;}
      const r=await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
      const d=await r.json(); $('loginBtn').disabled=false;
      if(!r.ok){msg('loginMsg',d.error||'Could not create account.','err');return;}
      authMode('in'); msg('loginMsg','Account created. An admin needs to approve you before you can sign in.','ok'); return;
    }
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json(); $('loginBtn').disabled=false;
    if(r.status===401){msg('loginMsg','Wrong email or password.','err');return;}
    if(!r.ok){msg('loginMsg',d.error||'Could not sign in.','err');return;}
    if(d.approved===false){msg('loginMsg','Your account is waiting for an admin to approve it.','ok');return;}
    token=d.token; me={role:d.role,name:d.name,email:d.email,contractorLabel:d.contractorLabel};
    store.set('fo_token',token); store.set('fo_me',JSON.stringify(me));
    startApp();
  }catch(e){msg('loginMsg','Connection problem — the server may be waking up, try again in a moment.','err');$('loginBtn').disabled=false;}
}
$('signOut').onclick=()=>{store.del('fo_token');store.del('fo_me');location.reload();};

function startApp(){
  $('login').classList.add('hide'); $('app').classList.remove('hide');
  $('hWho').textContent=me.name||''; $('hRole').textContent=me.role;
  $('hRole').className='role'+(me.role==='admin'?' admin':'');
  $('viewToggle').onclick=()=>{ view=(view==='board')?'calendar':'board';
    $('viewToggle').textContent=(view==='board')?'📅 Calendar view':'☰ Board view';
    $('search').classList.toggle('hide',view!=='board'); render(); };
  $('search').oninput=render;
  $('refresh').onclick=loadJobs;
  $('usersBtn').classList.toggle('hide', me.role!=='admin');
  if(me.role==='admin') loadContractors();
  loadJobs();
}
async function loadContractors(){ try{const r=await fetch('/api/contractors',{headers:HEAD()});contractors=r.ok?await r.json():{};}catch(e){} }
async function loadJobs(){
  $('board').innerHTML='<div class="loading"><span class="spin"></span> Loading…</div>';
  try{
    const r=await fetch('/api/jobs',{headers:HEAD()});
    if(r.status===401){store.del('fo_token');store.del('fo_me');location.reload();return;}
    const d=await r.json(); sections=d.sections||[]; render();
  }catch(e){ $('board').innerHTML='<div class="empty">Could not load jobs.<br>'+esc(e.message)+'</div>'; }
}

function render(){ view==='calendar' ? renderCalendar() : renderBoard(); }

/* ---------- board view ---------- */
function renderBoard(){
  const q=($('search').value||'').toLowerCase();
  let secs=sections.filter(s=> boardFilter==='all' || s.board===boardFilter)
    .map(s=>({...s, jobs:s.jobs.filter(j=>!q ||
      (j.name||'').toLowerCase().includes(q)||(j.address||'').toLowerCase().includes(q)||(j.contractorLabel||'').toLowerCase().includes(q))}));
  const total=secs.reduce((n,s)=>n+s.jobs.length,0);
  if(!total){ $('board').innerHTML=`<div class="empty"><div class="big">🗂️</div><div>${me.role==='operative'?'No jobs assigned to you in these groups.':'No jobs in these groups.'}</div></div>`; return; }
  $('board').innerHTML=secs.map(sec=>{
    if(!sec.jobs.length) return '';
    const key=sec.boardId+'|'+sec.groupId, isCol=collapsed[key];
    const rows=sec.jobs.map(j=>`
      <tr onclick="openDetail('${j.id}','${j.boardId}')">
        <td class="name" style="--gc:${esc(sec.color)}"><div class="cell">${esc(j.name)}</div></td>
        <td><div class="cell ${j.address?'':'muted'}">${esc(j.address||'—')}</div></td>
        <td><div class="cell ${j.jobType?'':'muted'}">${esc(j.jobType||'—')}</div></td>
        <td><div class="cell ${j.contractorLabel?'':'muted'}">${esc(j.contractorLabel||'Unassigned')}</div></td>
        <td><div class="cell">${j.status?`<span class="pill" style="background:${esc(j.statusColor)}">${esc(j.status)}</span>`:'<span class="muted">—</span>'}</div></td>
        <td><div class="cell ${j.visit?'':'muted'}">${esc(j.visit||'—')}</div></td>
        <td><div class="cell cam">${j.photoCount?('📷 '+j.photoCount):'—'}</div></td>
      </tr>`).join('');
    return `<div class="group ${isCol?'collapsed':''}">
      <div class="ghead" style="color:${esc(sec.color)}" onclick="toggle('${key}')">
        <span class="caret"></span><span class="gtitle">${esc(sec.title)}</span>
        <span class="gboard">${esc(sec.board)}</span><span class="gcount">${sec.jobs.length}</span></div>
      ${isCol?'':`<div class="tablewrap"><table>
        <thead><tr><th>Job</th><th>Address</th><th>Job Type</th><th>Contractor</th><th>Works Status</th><th>Scheduled Visit</th><th>Photos</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`}
    </div>`;
  }).join('');
}
function toggle(k){ collapsed[k]=!collapsed[k]; renderBoard(); }

/* ---------- calendar view ---------- */
function scheduledJobs(){
  let jobs=sections.filter(s=> boardFilter==='all' || s.board===boardFilter).flatMap(s=>s.jobs);
  jobs=jobs.filter(j=>j.visit); // must have a scheduled visit
  if(me.role==='admin' && contractorSel) jobs=jobs.filter(j=>contractorSel.has(j.contractorLabel||'Unassigned'));
  return jobs;
}
function renderCalendar(){
  const y=calRef.getFullYear(), m=calRef.getMonth();
  const jobs=scheduledJobs();
  // map date -> jobs
  const byDay={};
  jobs.forEach(j=>{ const d=j.visit.split(' ')[0]; (byDay[d]=byDay[d]||[]).push(j); });
  Object.values(byDay).forEach(arr=>arr.sort((a,b)=>(a.visit.split(' ')[1]||'').localeCompare(b.visit.split(' ')[1]||'')));

  // contractor filter (admin)
  let filterHtml='';
  if(me.role==='admin'){
    const names=[...new Set(sections.flatMap(s=>s.jobs).filter(j=>j.visit).map(j=>j.contractorLabel||'Unassigned'))].sort();
    const label = !contractorSel ? 'All contractors' : (contractorSel.size===1?[...contractorSel][0]:contractorSel.size+' contractors');
    filterHtml=`<div class="filterwrap">
      <button class="filterbtn" id="filterBtn">👤 ${esc(label)} ▾</button>
      <div class="filterpanel" id="filterPanel">
        <div class="fhead"><button class="link" onclick="setAllContractors()">Select all</button><button class="link" onclick="clearContractors()">Clear</button></div>
        ${names.map(n=>`<label class="fitem"><input type="checkbox" value="${esc(n)}" ${(!contractorSel||contractorSel.has(n))?'checked':''} onchange="toggleContractor(this)"> ${esc(n)}</label>`).join('')}
      </div></div>`;
  }

  const today=new Date(); const isToday=d=>d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
  const first=new Date(y,m,1); let off=(first.getDay()+6)%7; // Monday-based
  const start=new Date(y,m,1-off);
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const out=d.getMonth()!==m;
    const list=byDay[ds]||[];
    const shown=list.slice(0,3).map(j=>{
      const t=(j.visit.split(' ')[1]||'');
      return `<div class="evt" style="background:${esc(j.groupColor||'#0073ea')}" title="${esc(j.name)}" onclick="event.stopPropagation();openDetail('${j.id}','${j.boardId}')">${t?esc(t)+' ':''}${esc(j.contractorLabel||j.name)}</div>`;
    }).join('');
    const more=list.length>3?`<div class="evtmore">+${list.length-3} more</div>`:'';
    cells+=`<div class="day ${out?'out':''} ${isToday(d)?'today':''}" onclick="openDay('${ds}')">
      <span class="daynum">${d.getDate()}</span>${shown}${more}</div>`;
  }
  $('board').innerHTML=`
    <div class="calbar">
      <button class="navbtn" onclick="calMove(-1)">‹</button>
      <div class="calmonth">${MONTHS[m]} ${y}</div>
      <button class="navbtn" onclick="calMove(1)">›</button>
      <button class="todaybtn" onclick="calToday()">Today</button>
      ${filterHtml}
    </div>
    <div class="grid">
      ${WD.map(w=>`<div class="gridhead">${w}</div>`).join('')}
      ${cells}
    </div>
    <div class="daypanel" id="daypanel"></div>`;
  if(me.role==='admin'){
    const fb=$('filterBtn'); if(fb) fb.onclick=()=>$('filterPanel').classList.toggle('open');
  }
  if(calSelDay) openDay(calSelDay);
}
function calMove(n){ calRef=new Date(calRef.getFullYear(),calRef.getMonth()+n,1); calSelDay=null; renderCalendar(); }
function calToday(){ calRef=new Date(); calSelDay=null; renderCalendar(); }
function toggleContractor(cb){
  const names=[...new Set(sections.flatMap(s=>s.jobs).filter(j=>j.visit).map(j=>j.contractorLabel||'Unassigned'))];
  if(!contractorSel) contractorSel=new Set(names);
  if(cb.checked) contractorSel.add(cb.value); else contractorSel.delete(cb.value);
  if(contractorSel.size===names.length) contractorSel=null; // all
  renderCalendar();
}
function setAllContractors(){ contractorSel=null; renderCalendar(); }
function clearContractors(){ contractorSel=new Set(); renderCalendar(); }
function openDay(ds){
  calSelDay=ds;
  const jobs=scheduledJobs().filter(j=>j.visit.split(' ')[0]===ds)
    .sort((a,b)=>(a.visit.split(' ')[1]||'').localeCompare(b.visit.split(' ')[1]||''));
  const p=$('daypanel'); if(!p)return;
  const d=new Date(ds+'T00:00:00');
  const head=`<h3>${WD[(d.getDay()+6)%7]} ${d.getDate()} ${MONTHS[d.getMonth()]}</h3>`;
  if(!jobs.length){ p.innerHTML=head+'<div class="muted" style="font-size:14px">No visits scheduled.</div>'; return; }
  p.innerHTML=head+jobs.map(j=>`
    <div class="dayjob" style="--gc:${esc(j.groupColor||'#c4c4c4')}" onclick="openDetail('${j.id}','${j.boardId}')">
      <div class="t">${esc(j.visit.split(' ')[1]||'')}</div>
      <div><div class="nm">${esc(j.name)}</div>
        <div class="sub">${esc(j.board)} · ${esc(j.contractorLabel||'Unassigned')}${j.address?' · '+esc(j.address):''}</div></div>
    </div>`).join('');
}

/* ---------- detail (shared) ---------- */
async function openDetail(id, boardId){
  const job=findJob(id);
  $('detailInner').innerHTML='<div class="loading"><span class="spin"></span> Loading job…</div>';
  $('detailSheet').classList.add('open');
  let full=job;
  try{ const r=await fetch(`/api/jobs/${id}?board=${boardId}`,{headers:HEAD()}); if(r.ok) full=await r.json(); }catch(e){}
  renderDetail(full||job);
}
function findJob(id){ for(const s of sections){const j=s.jobs.find(x=>x.id===id); if(j)return j;} return null; }
function renderDetail(j){
  const isAdmin=me.role==='admin';
  const opts=(contractors[j.boardId]||[]);
  const assign = isAdmin ? `
    <label>Assign contractor</label>
    <select id="d_contractor"><option value="">— Select —</option>
      ${opts.map(c=>`<option value="${c.id}" ${j.contractorIds&&j.contractorIds.map(String).includes(String(c.id))?'selected':''}>${esc(c.label)}</option>`).join('')}
    </select>
    <div class="row2">
      <div><label>Visit date</label><input id="d_date" type="date" value="${j.visit?j.visit.split(' ')[0]:''}"></div>
      <div><label>Time</label><input id="d_time" type="time" value="${j.visit&&j.visit.split(' ')[1]?j.visit.split(' ')[1]:''}"></div>
    </div>
    <button class="btn" id="d_save">Save assignment</button>` : `
    <div class="chip" style="margin-top:8px">🗓️ ${j.visit?esc(j.visit):'No visit scheduled'}</div>`;
  const photos=(j.photos||[]).map(p=> p.isImage
    ? `<img src="${p.url}" onclick="lightOpen('${p.url}')">`
    : `<a class="file" href="${p.url}" target="_blank">📄 ${esc(p.name||'file')}</a>`).join('');
  $('detailInner').innerHTML=`
    <h2>${esc(j.name)}</h2>
    <div class="detail-meta">
      <span class="chip"><b>${esc(j.board)}</b> · ${esc(j.groupTitle||'')}</span>
      ${j.address?`<span class="chip">📍 ${esc(j.address)}</span>`:''}
      ${j.jobType?`<span class="chip">${esc(j.jobType)}</span>`:''}
      ${j.status?`<span class="chip">${esc(j.status)}</span>`:''}
      ${j.contractorLabel?`<span class="chip">👤 <b>${esc(j.contractorLabel)}</b></span>`:''}
    </div>
    ${j.description?`<label>Description</label><div class="note-box">${esc(j.description)}</div>`:''}
    ${assign}
    <label>Photos (Evidence)</label>
    <div class="photo-grid" id="pgrid">${photos}<div class="add" id="addPhoto">📷<span>Add</span></div></div>
    <button class="btn ghost" onclick="closeSheet()">Close</button>
    <div class="msg" id="d_msg"></div>`;
  $('addPhoto').onclick=()=>{photoTarget={id:j.id,boardId:j.boardId};$('fileInput').value='';$('fileInput').click();};
  if(isAdmin) $('d_save').onclick=()=>saveAssign(j);
}
async function saveAssign(j){
  const contractorId=$('d_contractor').value, date=$('d_date').value, time=$('d_time').value;
  $('d_save').disabled=true; msg('d_msg','Saving…','');
  try{
    const r=await fetch(`/api/jobs/${j.id}/assign`,{method:'POST',headers:{...HEAD(),'Content-Type':'application/json'},
      body:JSON.stringify({boardId:j.boardId,contractorId,date,time})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Failed');
    msg('d_msg','Saved to Monday ✓','ok');
    await loadJobs();
    const r2=await fetch(`/api/jobs/${j.id}?board=${j.boardId}`,{headers:HEAD()}); if(r2.ok)renderDetail(await r2.json());
  }catch(e){ msg('d_msg',e.message,'err'); }
  $('d_save').disabled=false;
}
$('fileInput').addEventListener('change',async e=>{
  const t=photoTarget, files=[...e.target.files]; if(!files.length||!t)return;
  msg('d_msg',`Uploading ${files.length} photo(s)…`,'');
  for(const file of files){
    const blob=await resize(file);
    const fd=new FormData(); fd.append('photo',blob,(file.name||'photo')+'.jpg'); fd.append('boardId',t.boardId);
    const r=await fetch(`/api/jobs/${t.id}/photo`,{method:'POST',headers:HEAD(),body:fd});
    if(!r.ok){const d=await r.json().catch(()=>({}));msg('d_msg','Upload failed: '+(d.error||r.status),'err');return;}
  }
  msg('d_msg','Photos uploaded to Monday ✓','ok');
  const r2=await fetch(`/api/jobs/${t.id}?board=${t.boardId}`,{headers:HEAD()}); if(r2.ok)renderDetail(await r2.json());
  loadJobs();
});
function resize(file){return new Promise(res=>{
  const img=new Image(),reader=new FileReader();
  reader.onload=()=>img.src=reader.result;
  img.onload=()=>{const max=1600;let{width:w,height:h}=img;
    if(w>h&&w>max){h=h*max/w;w=max}else if(h>max){w=w*max/h;h=max}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(b=>res(b),'image/jpeg',0.8);};
  reader.readAsDataURL(file);});}
function lightOpen(u){$('lightImg').src=u;$('lightbox').classList.add('open');}
$('lightbox').onclick=()=>$('lightbox').classList.remove('open');
function closeSheet(){$('detailSheet').classList.remove('open');}
$('detailSheet').addEventListener('click',e=>{if(e.target===$('detailSheet'))closeSheet();});

/* auto sign-in if a valid token is remembered (verified by the first API call) */
(function(){ const m=store.get('fo_me'); if(token&&m){ try{ me=JSON.parse(m); startApp(); }catch(e){ store.del('fo_token'); store.del('fo_me'); } } })();

/* ---- admin: users / approvals ---- */
async function openUsers(){
  $('usersInner').innerHTML='<div class="loading"><span class="spin"></span> Loading users…</div>';
  $('usersSheet').classList.add('open');
  if(!Object.keys(contractors).length) await loadContractors();
  const names=[...new Set(Object.values(contractors).flat().map(c=>c.label))].sort();
  $('contractorList').innerHTML=names.map(n=>`<option value="${esc(n)}">`).join('');
  let users=[]; try{ const r=await fetch('/api/users',{headers:HEAD()}); users=r.ok?await r.json():[]; }catch(e){}
  renderUsers(users);
}
function renderUsers(users){
  const pending=users.filter(u=>u.role==='pending'), active=users.filter(u=>u.role!=='pending');
  const row=u=>`
    <div class="urow" data-id="${u.id}">
      <div class="uinfo"><div class="uname">${esc(u.name||'(no name)')}</div><div class="uemail">${esc(u.email)}</div></div>
      <select class="urole">
        <option value="pending" ${u.role==='pending'?'selected':''}>Pending</option>
        <option value="operative" ${u.role==='operative'?'selected':''}>Operative</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
      </select>
      <input class="ucon" list="contractorList" placeholder="Contractor name" value="${esc(u.contractor||'')}">
      <button class="usave" onclick="saveUser('${u.id}',this)">Save</button>
    </div>`;
  $('usersInner').innerHTML=`
    <h2>Users</h2>
    <p style="color:var(--muted);font-size:13px;margin:2px 0 12px">To approve a sign-up: set them to <b>Operative</b> and type the <b>Contractor</b> name they cover (must match the boards exactly). They'll then see only that contractor's jobs and calendar.</p>
    ${pending.length?`<label>Waiting for approval (${pending.length})</label>${pending.map(row).join('')}`:'<div class="muted" style="font-size:13px;margin-bottom:6px">No one waiting for approval.</div>'}
    <label style="margin-top:14px">All accounts</label>
    ${active.length?active.map(row).join(''):'<div class="muted" style="font-size:14px">No approved accounts yet.</div>'}
    <button class="btn ghost" onclick="closeUsers()">Close</button>
    <div class="msg" id="usersMsg"></div>`;
}
async function saveUser(id,btn){
  const rowEl=btn.closest('.urow');
  const role=rowEl.querySelector('.urole').value;
  const contractor=rowEl.querySelector('.ucon').value.trim();
  btn.disabled=true; msg('usersMsg','Saving…','');
  try{
    const r=await fetch('/api/users/'+id,{method:'POST',headers:JHEAD(),body:JSON.stringify({role,contractor})});
    const d=await r.json(); if(!r.ok)throw new Error(d.error||'Failed');
    msg('usersMsg','Saved ✓','ok');
  }catch(e){ msg('usersMsg',e.message,'err'); }
  btn.disabled=false;
}
function closeUsers(){ $('usersSheet').classList.remove('open'); }
$('usersSheet').addEventListener('click',e=>{if(e.target===$('usersSheet'))closeUsers();});
</script>
